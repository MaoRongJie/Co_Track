<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Co-Track train orbit icon</title>
  <desc id="desc">A stylized high-speed train inside blue collaborative orbit arcs.</desc>
  <defs>
