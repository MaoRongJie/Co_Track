<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">任务识别 Agent 技术框架</title>
  <desc id="desc">Co-Track 第一阶段任务识别 Agent 的简化框架，以输入、Agent、输出为主线，并在侧枝标注模型、工具和兜底机制。</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .core { fill: #0f172a; stroke: #0f172a; stroke-width: 1.2; }
      .input { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.2; }
      .output { fill: #eef6f5; stroke: #3f7f7a; stroke-width: 1.2; }
      .support { fill: #f3f0fa; stroke: #6d5a9c; stroke-width: 1.2; }
      .tool { fill: #f5f2ea; stroke: #8a7447; stroke-width: 1.2; }
      .fallback { fill: #f6f1f1; stroke: #8b5d5d; stroke-width: 1.2; }
      .title { font: 700 28px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .h { font: 700 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .t { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .core-title { font: 700 22px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .core-text { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #cbd5e1; }
      .line { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .side-line { stroke: #64748b; stroke-width: 1.25; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="520"/>

  <text x="64" y="58" class="title">任务识别 Agent 技术框架</text>
  <text x="64" y="84" class="subtitle">以“输入—Agent—输出”为主线，将设计任务解析为可复用的结构化设计简报</text>

  <!-- Main flow -->
  <rect x="80" y="206" width="230" height="126" rx="10" class="input"/>
  <text x="120" y="249" class="h">输入</text>
  <text x="120" y="279" class="t">设计目标 / 任务文档</text>
  <text x="120" y="304" class="small">车型类别、项目语境</text>

  <rect x="420" y="184" width="280" height="170" rx="10" class="core"/>
  <text x="464" y="234" class="core-title">任务识别 Agent</text>
  <text x="464" y="268" class="core-text">角色：第一阶段任务解析者</text>
  <text x="464" y="295" class="core-text">逻辑：WHY / WHAT / HOW</text>
  <text x="464" y="322" class="core-text">要求：保留开放性，输出 JSON</text>

  <rect x="810" y="206" width="230" height="126" rx="10" class="output"/>
  <text x="850" y="249" class="h">输出</text>
  <text x="850" y="279" class="t">brief_json</text>
  <text x="850" y="304" class="small">情感意图、视觉方向、约束边界</text>

  <!-- Side branches -->
  <rect x="390" y="104" width="160" height="62" rx="9" class="support"/>
  <text x="424" y="132" class="h">调用模型</text>
  <text x="424" y="154" class="small">gpt-4.1-free</text>

  <rect x="570" y="104" width="190" height="62" rx="9" class="tool"/>
  <text x="604" y="132" class="h">处理工具</text>
  <text x="604" y="154" class="small">LangGraph / JSON 规范化</text>

  <rect x="480" y="388" width="160" height="62" rx="9" class="fallback"/>
  <text x="514" y="416" class="h">兜底机制</text>
  <text x="514" y="438" class="small">启发式解析</text>

  <!-- Lines -->
  <path d="M310 269 L420 269" class="line"/>
  <path d="M700 269 L810 269" class="line"/>
  <path d="M500 166 L530 184" class="side-line"/>
  <path d="M660 166 L596 184" class="side-line"/>
  <path d="M560 388 L560 354" class="side-line"/>
</svg>
