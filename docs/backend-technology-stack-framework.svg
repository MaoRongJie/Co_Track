<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Co-Track 后端技术栈框架图</title>
  <desc id="desc">展示 Co-Track 后端实际技术结构：ASGI 入口、FastAPI 路由、Socket.IO、SQLAlchemy、模型文件处理、静态资源服务与 Agent Provider 调度。</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .core { fill: #0f172a; stroke: #0f172a; stroke-width: 1.2; }
      .module-a { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.2; }
      .module-b { fill: #eef6f5; stroke: #3f7f7a; stroke-width: 1.2; }
      .module-c { fill: #f3f0fa; stroke: #6d5a9c; stroke-width: 1.2; }
      .module-d { fill: #f5f2ea; stroke: #8a7447; stroke-width: 1.2; }
      .module-e { fill: #f6f1f1; stroke: #8b5d5d; stroke-width: 1.2; }
      .external { fill: none; stroke: #94a3b8; stroke-width: 1.3; stroke-dasharray: 8 6; }
      .title { font: 700 28px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .core-title { font: 700 23px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .core-text { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #cbd5e1; }
      .h { font: 700 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .t { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .line { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="640"/>

  <text x="64" y="58" class="title">Co-Track 后端技术栈框架</text>
  <text x="64" y="84" class="subtitle">以 ASGI 服务为入口，组织接口、实时事件、数据持久化、模型资源与 Agent 调用</text>

  <!-- Entry -->
  <rect x="280" y="120" width="560" height="96" rx="10" class="core"/>
  <text x="370" y="162" class="core-title">ASGI 后端入口</text>
  <text x="370" y="190" class="core-text">FastAPI 应用 + Socket.IO Server · Pydantic 数据校验</text>

  <!-- External frontend and storage -->
  <rect x="62" y="121" width="170" height="94" rx="10" class="external"/>
  <text x="104" y="160" class="h">前端工作台</text>
  <text x="91" y="188" class="small">REST / Socket.IO / WebRTC</text>

  <rect x="888" y="121" width="170" height="94" rx="10" class="external"/>
  <text x="927" y="160" class="h">静态资源</text>
  <text x="910" y="188" class="small">models / uv / textures</text>

  <!-- Middle modules -->
  <rect x="80" y="286" width="220" height="120" rx="10" class="module-a"/>
  <text x="112" y="326" class="h">REST 路由</text>
  <text x="112" y="356" class="t">auth / sessions / ai</text>
  <text x="112" y="382" class="small">models / rtc / workflow</text>

  <rect x="330" y="286" width="220" height="120" rx="10" class="module-b"/>
  <text x="362" y="326" class="h">数据层</text>
  <text x="362" y="356" class="t">SQLAlchemy ORM</text>
  <text x="362" y="382" class="small">用户 · 会议 · 模型 · 媒体</text>

  <rect x="580" y="286" width="220" height="120" rx="10" class="module-c"/>
  <text x="612" y="326" class="h">实时通信</text>
  <text x="612" y="356" class="t">python-socketio</text>
  <text x="612" y="382" class="small">阶段事件 · 进度 · WebRTC 信令</text>

  <rect x="830" y="286" width="220" height="120" rx="10" class="module-d"/>
  <text x="862" y="326" class="h">模型资源处理</text>
  <text x="862" y="356" class="t">GLB / GLTF</text>
  <text x="862" y="382" class="small">规范化 · UV 模板 · 贴图应用</text>

  <!-- Agent providers -->
  <rect x="210" y="486" width="700" height="82" rx="10" class="module-e"/>
  <text x="416" y="518" class="h">Agent 与 Provider 层</text>
  <text x="276" y="546" class="small">任务识别 · 纹理规划 · 图案生成 · 角色评审 · 场景媒体生成</text>

  <!-- Lines -->
  <path d="M232 168 L280 168" class="line"/>
  <path d="M840 168 L888 168" class="line"/>
  <path d="M560 216 L560 250" class="line"/>

  <path d="M560 250 L190 250 L190 286" class="line"/>
  <path d="M560 250 L440 250 L440 286" class="line"/>
  <path d="M560 250 L690 250 L690 286" class="line"/>
  <path d="M560 250 L940 250 L940 286" class="line"/>

  <path d="M190 406 L190 446 L560 446 L560 486" class="line"/>
  <path d="M440 406 L440 446 L560 446" class="line"/>
  <path d="M690 406 L690 446 L560 446" class="line"/>
  <path d="M940 406 L940 446 L560 446" class="line"/>
</svg>
