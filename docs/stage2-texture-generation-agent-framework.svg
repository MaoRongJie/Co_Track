<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">纹理生成 Agent 信息处理流程</title>
  <desc id="desc">Co-Track 第二阶段纹理生成 Agent 的信息处理流程。Agent 负责规划方案和提示词，后端调度 Meshy 重纹理服务生成三维纹理结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .core { fill: #0f172a; stroke: #0f172a; stroke-width: 1.2; }
      .input { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.2; }
      .service { fill: #eef2f7; stroke: #506783; stroke-width: 1.2; }
      .output { fill: #eef6f5; stroke: #3f7f7a; stroke-width: 1.2; }
      .model { fill: #f3f0fa; stroke: #6d5a9c; stroke-width: 1.2; }
      .external { fill: #f5f2ea; stroke: #8a7447; stroke-width: 1.2; }
      .edit { fill: #f6f1f1; stroke: #8b5d5d; stroke-width: 1.2; }
      .title { font: 700 28px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .h { font: 700 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .t { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .core-title { font: 700 22px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .core-text { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #cbd5e1; }
      .line { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .side-line { stroke: #64748b; stroke-width: 1.25; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="540"/>

  <text x="64" y="58" class="title">纹理生成 Agent 信息处理流程</text>
  <text x="64" y="84" class="subtitle">Agent 负责生成纹理方案与提示词，后端负责调用外部重纹理服务并同步结果</text>

  <!-- Main flow -->
  <rect x="54" y="210" width="210" height="130" rx="10" class="input"/>
  <text x="92" y="253" class="h">输入</text>
  <text x="92" y="283" class="t">设计简报、基础模型</text>
  <text x="92" y="308" class="small">文字 / 文档 / 参考图线索</text>

  <rect x="330" y="186" width="250" height="178" rx="10" class="core"/>
  <text x="370" y="238" class="core-title">纹理生成 Agent</text>
  <text x="370" y="272" class="core-text">角色：纹理方案规划者</text>
  <text x="370" y="299" class="core-text">生成：三套差异化方案</text>
  <text x="370" y="326" class="core-text">输出：重纹理提示词</text>

  <rect x="656" y="210" width="210" height="130" rx="10" class="service"/>
  <text x="694" y="253" class="h">后端调度</text>
  <text x="694" y="283" class="t">提交重纹理任务</text>
  <text x="694" y="308" class="small">轮询、下载、保存、同步</text>

  <rect x="924" y="210" width="160" height="130" rx="10" class="output"/>
  <text x="958" y="253" class="h">输出</text>
  <text x="958" y="283" class="t">三套重纹理结果</text>
  <text x="958" y="308" class="small">模型文件、贴图、预览</text>

  <!-- Side branches -->
  <rect x="350" y="104" width="190" height="62" rx="9" class="model"/>
  <text x="384" y="132" class="h">调用模型</text>
  <text x="384" y="154" class="small">gpt-4.1-free</text>

  <rect x="656" y="398" width="210" height="66" rx="9" class="external"/>
  <text x="694" y="427" class="h">外部服务</text>
  <text x="694" y="449" class="small">Meshy Retexture API</text>

  <rect x="924" y="398" width="160" height="66" rx="9" class="edit"/>
  <text x="958" y="427" class="h">继续编辑</text>
  <text x="958" y="449" class="small">UV 画布与三维预览</text>

  <!-- Lines -->
  <path d="M264 275 L330 275" class="line"/>
  <path d="M580 275 L656 275" class="line"/>
  <path d="M866 275 L924 275" class="line"/>
  <path d="M445 166 L445 186" class="side-line"/>
  <path d="M761 340 L761 398" class="side-line"/>
  <path d="M1004 340 L1004 398" class="side-line"/>
</svg>
