<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title {
        font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", Arial, sans-serif;
        font-size: 32px;
        font-weight: 700;
        fill: #243447;
      }
      .subtitle {
        font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", Arial, sans-serif;
        font-size: 18px;
        fill: #687381;
      }
      .word {
        font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", Arial, sans-serif;
        font-weight: 700;
        dominant-baseline: middle;
        text-anchor: middle;
      }
      .note {
        font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", Arial, sans-serif;
        font-size: 16px;
        fill: #7B8490;
      }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#FFFFFF"/>

  <text x="600" y="68" class="title" text-anchor="middle">受访者专业方向词云</text>
  <text x="600" y="104" class="subtitle" text-anchor="middle">有效样本 n=25；交通工具设计并入产品设计统计</text>

  <g transform="translate(600 405)">
    <text class="word" x="0" y="-10" font-size="102" fill="#2F5F8F">产品设计</text>
    <text class="word" x="-315" y="-60" font-size="72" fill="#3E6F66" transform="rotate(-8 -315 -60)">工业设计</text>
    <text class="word" x="305" y="-82" font-size="50" fill="#8A5F3F" transform="rotate(7 305 -82)">UI/UX</text>
    <text class="word" x="-245" y="95" font-size="46" fill="#7B6A9E" transform="rotate(6 -245 95)">视觉设计</text>
    <text class="word" x="245" y="96" font-size="38" fill="#A15D5D" transform="rotate(-6 245 96)">数字媒体</text>
    <text class="word" x="-40" y="142" font-size="34" fill="#5D7E9E" transform="rotate(0 -40 142)">交互设计</text>
    <text class="word" x="-410" y="168" font-size="28" fill="#7C8794" transform="rotate(-9 -410 168)">其他</text>
    <text class="word" x="395" y="172" font-size="28" fill="#7C8794" transform="rotate(8 395 172)">环境设计</text>
  </g>

  <g transform="translate(156 642)">
    <rect x="0" y="-18" width="888" height="1" fill="#D8DDE3"/>
    <text x="0" y="22" class="note">模拟统计：产品设计 11 人，工业设计 7 人，UI/UX 3 人，视觉设计 2 人，数字媒体 1 人，环境设计 1 人。</text>
  </g>
</svg>
