<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">不在场角色评审 Agent 信息处理流程</title>
  <desc id="desc">Co-Track 第三阶段不在场角色评审 Agent 的信息处理流程。Agent 根据候选方案、纹理图像、模型信息和角色设置调用评审模型，输出结构化评审反馈，供团队后续讨论和决策。</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155"/>
    </marker>
    <marker id="plainArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .core { fill: #53689c; stroke: #1f2f55; stroke-width: 1.3; }
      .input { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.2; }
      .output { fill: #eef6f5; stroke: #3f7f7a; stroke-width: 1.2; }
      .model { fill: #f3f0fa; stroke: #8b78b7; stroke-width: 1.2; }
      .role { fill: #eef2f7; stroke: #506783; stroke-width: 1.2; }
      .tool { fill: #f5f2ea; stroke: #8a7447; stroke-width: 1.2; }
      .decision { fill: #f6f1f1; stroke: #8b5d5d; stroke-width: 1.2; }
      .title { font: 700 28px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .h { font: 700 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .t { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .core-title { font: 700 19px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .core-text { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #dbe4f0; }
      .line { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .side-line { stroke: #64748b; stroke-width: 1.25; fill: none; marker-end: url(#plainArrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="540"/>

  <text x="64" y="58" class="title">不在场角色评审 Agent 信息处理流程</text>
  <text x="64" y="84" class="subtitle">模拟工程、乘客和自定义利益相关者视角，为候选方案提供结构化参考反馈</text>

  <!-- Main flow -->
  <rect x="48" y="218" width="204" height="126" rx="10" class="input"/>
  <text x="86" y="260" class="h">输入</text>
  <text x="86" y="290" class="t">候选方案与纹理图像</text>
  <text x="86" y="316" class="small">设计简报、模型信息、方案说明</text>

  <rect x="322" y="190" width="276" height="182" rx="10" class="core"/>
  <text x="362" y="242" class="core-title">不在场角色评审 Agent</text>
  <text x="362" y="276" class="core-text">角色：补充性评审参与者</text>
  <text x="362" y="304" class="core-text">视角：工程 / 乘客 / 自定义</text>
  <text x="362" y="332" class="core-text">边界：提供参考，不替代决策</text>

  <rect x="690" y="218" width="204" height="126" rx="10" class="output"/>
  <text x="728" y="260" class="h">输出</text>
  <text x="728" y="290" class="t">结构化评审反馈</text>
  <text x="728" y="316" class="small">评分、优点、问题、建议</text>

  <rect x="958" y="218" width="132" height="126" rx="10" class="decision"/>
  <text x="988" y="260" class="h">后续决策</text>
  <text x="988" y="290" class="t">团队讨论</text>
  <text x="988" y="316" class="small">采纳、拒绝或修改</text>

  <!-- Side branches -->
  <rect x="328" y="106" width="180" height="62" rx="9" class="model"/>
  <text x="362" y="134" class="h">调用模型</text>
  <text x="362" y="156" class="small">gpt-4o</text>

  <rect x="540" y="106" width="190" height="62" rx="9" class="role"/>
  <text x="574" y="134" class="h">角色配置</text>
  <text x="574" y="156" class="small">工程 / 乘客 / 自定义</text>

  <rect x="348" y="408" width="224" height="66" rx="9" class="tool"/>
  <text x="386" y="437" class="h">内部处理</text>
  <text x="386" y="459" class="small">图像指标 / JSON 校验 / 推荐等级</text>

  <!-- Lines -->
  <path d="M252 281 L322 281" class="line"/>
  <path d="M598 281 L690 281" class="line"/>
  <path d="M894 281 L958 281" class="line"/>

  <path d="M418 190 L418 168" class="side-line"/>
  <path d="M444 168 L444 190" class="side-line"/>
  <path d="M635 168 L542 190" class="side-line"/>
  <path d="M460 372 L460 408" class="side-line"/>
</svg>
