<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1200" viewBox="0 0 1440 1200" role="img" aria-labelledby="title desc">
  <title id="title">Co-Track 第二阶段角色评审召唤状态低保真界面图</title>
  <desc id="desc">第二阶段特定交互状态低保真线框图：左侧纹理规划侧栏收拢，中心 UV 画布展开，右侧 3D 联动预览和纹理方案列表显示，成员栏打开，并通过 F/G 快捷键召唤工程与乘客角色评审气泡。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .top { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .panel { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .panel-soft { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .line { stroke: #94a3b8; stroke-width: 1.4; fill: none; }
      .dash { stroke: #94a3b8; stroke-width: 1.4; stroke-dasharray: 7 7; fill: none; }
      .muted { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1; }
      .active { fill: #dbeafe; stroke: #64748b; stroke-width: 1.2; }
      .button { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1.2; }
      .primary { fill: #cbd5e1; stroke: #64748b; stroke-width: 1.2; }
      .canvas { fill: #ffffff; stroke: #64748b; stroke-width: 1.4; }
      .bubble { fill: #ffffff; stroke: #64748b; stroke-width: 1.4; }
      .overlay { fill: #ffffff; fill-opacity: 0.96; stroke: #64748b; stroke-width: 1.4; }
      .text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #334155; font-size: 16px; }
      .small { font-size: 13px; fill: #64748b; }
      .tiny { font-size: 11px; fill: #64748b; letter-spacing: 1px; }
      .title { font-size: 19px; font-weight: 700; fill: #1e293b; }
      .section { font-size: 15px; font-weight: 700; fill: #334155; }
      .label { font-size: 12px; fill: #64748b; }
      .key { font-size: 13px; font-weight: 700; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="1200"/>

  <!-- App header -->
  <rect class="top" x="0.5" y="0.5" width="1439" height="70"/>
  <text class="title" x="32" y="31">Co-Track 协同涂装设计会议</text>
  <text class="small" x="32" y="52">第二阶段：角色评审气泡已召唤 / 成员栏展开</text>

  <g transform="translate(500 20)">
    <rect class="active" x="0" y="0" width="92" height="30" rx="15"/>
    <text class="tiny" x="22" y="20">S1 简报</text>
    <line class="line" x1="100" y1="15" x2="122" y2="15"/>
    <rect class="active" x="130" y="0" width="92" height="30" rx="15"/>
    <text class="tiny" x="151" y="20">S2 设计</text>
    <line class="line" x1="230" y1="15" x2="252" y2="15"/>
    <rect class="muted" x="260" y="0" width="92" height="30" rx="15"/>
    <text class="tiny" x="281" y="20">S3 评审</text>
    <line class="line" x1="360" y1="15" x2="382" y2="15"/>
    <rect class="muted" x="390" y="0" width="92" height="30" rx="15"/>
    <text class="tiny" x="411" y="20">S4 预览</text>
  </g>

  <g transform="translate(1176 16)">
    <rect class="button" x="0" y="0" width="40" height="40" rx="10"/>
    <text class="small" x="11" y="26">设</text>
    <rect class="button" x="54" y="0" width="116" height="40" rx="12"/>
    <text class="small" x="80" y="25">返回简报</text>
    <rect class="primary" x="184" y="0" width="116" height="40" rx="12"/>
    <text class="small" x="210" y="25">进入评审</text>
  </g>

  <!-- Stage body -->
  <g transform="translate(0 70)">
    <rect class="bg" x="0" y="0" width="1440" height="1130"/>

    <!-- Collapsed texture planning sidebar -->
    <rect class="panel-soft" x="0" y="0" width="18" height="1130"/>
    <circle class="top" cx="18" cy="565" r="13"/>
    <path class="line" d="M13 557 L21 565 L13 573"/>
    <rect class="top" x="34" y="510" width="142" height="44" rx="12"/>
    <text class="label" x="54" y="537">纹理规划已收拢</text>

    <!-- Center canvas workspace -->
    <g transform="translate(18 0)">
      <rect class="bg" x="0" y="0" width="782" height="1130"/>
      <rect class="top" x="0" y="0" width="782" height="58"/>
      <g transform="translate(18 12)">
        <rect class="active" x="0" y="0" width="68" height="34" rx="12"/>
        <text class="tiny" x="19" y="22">选择</text>
        <rect class="button" x="78" y="0" width="68" height="34" rx="12"/>
        <text class="tiny" x="99" y="22">画笔</text>
        <rect class="button" x="156" y="0" width="68" height="34" rx="12"/>
        <text class="tiny" x="177" y="22">矩形</text>
        <rect class="button" x="234" y="0" width="68" height="34" rx="12"/>
        <text class="tiny" x="255" y="22">椭圆</text>
        <rect class="button" x="312" y="0" width="68" height="34" rx="12"/>
        <text class="tiny" x="337" y="22">线</text>
        <rect class="button" x="390" y="0" width="68" height="34" rx="12"/>
        <text class="tiny" x="411" y="22">擦除</text>
        <rect class="button" x="474" y="0" width="34" height="34" rx="10"/>
        <text class="tiny" x="485" y="22">AI</text>
        <rect class="button" x="520" y="0" width="56" height="34" rx="10"/>
        <text class="tiny" x="535" y="22">描边</text>
        <rect class="button" x="586" y="0" width="56" height="34" rx="10"/>
        <text class="tiny" x="602" y="22">填充</text>
        <rect class="top" x="664" y="4" width="88" height="26" rx="13"/>
        <text class="label" x="682" y="23">自动保存</text>
      </g>

      <rect class="panel-soft" x="0" y="58" width="782" height="1072"/>
      <rect class="canvas" x="70" y="214" width="642" height="398" rx="12"/>
      <text class="section" x="330" y="424">UV 纹理画布</text>
      <path class="dash" d="M124 342 H658 M124 462 H658 M216 244 V584 M566 244 V584"/>
      <path class="line" d="M154 520 C252 420, 364 492, 482 386 C532 342, 592 332, 654 356"/>
      <rect class="top" x="562" y="86" width="150" height="36" rx="10"/>
      <text class="label" x="584" y="109">应用纹理 / - 100% +</text>
      <rect class="top" x="48" y="1016" width="188" height="34" rx="9"/>
      <text class="label" x="70" y="1038">UV 2048 x 1024</text>
    </g>

    <!-- Stage2 linked preview sidebar -->
    <g transform="translate(800 0)">
      <rect class="top" x="0" y="0" width="352" height="1130"/>
      <text class="tiny" x="24" y="36">S2</text>
      <text class="section" x="24" y="62">评估 / 3D 联动预览</text>

      <rect class="panel-soft" x="24" y="88" width="304" height="288" rx="16"/>
      <path class="dash" d="M70 272 C122 178, 226 166, 284 266"/>
      <rect class="muted" x="108" y="226" width="136" height="42" rx="21"/>
      <text class="small" x="140" y="253">3D 模型</text>
      <rect class="active" x="44" y="104" width="88" height="30" rx="8"/>
      <text class="label" x="65" y="124">Meshy</text>
      <rect class="button" x="140" y="104" width="88" height="30" rx="8"/>
      <text class="label" x="160" y="124">已编辑</text>
      <rect class="primary" x="248" y="104" width="58" height="30" rx="8"/>
      <text class="label" x="267" y="124">添加</text>

      <text class="section" x="24" y="430">纹理方案</text>
      <rect class="panel-soft" x="24" y="456" width="304" height="62" rx="14"/>
      <text class="label" x="44" y="492">F / G 可打开对应角色评审</text>

      <text class="tiny" x="24" y="552">生成批次 1</text>
      <g transform="translate(24 570)">
        <rect class="active" x="0" y="0" width="92" height="108" rx="14"/>
        <rect class="muted" x="27" y="18" width="38" height="30" rx="8"/>
        <text class="label" x="24" y="72">方案 A</text>
        <rect class="primary" x="18" y="82" width="56" height="18" rx="9"/>
        <text class="tiny" x="34" y="96">选中</text>
        <rect class="panel-soft" x="106" y="0" width="92" height="108" rx="14"/>
        <rect class="muted" x="133" y="18" width="38" height="30" rx="8"/>
        <text class="label" x="130" y="72">方案 B</text>
        <rect class="panel-soft" x="212" y="0" width="92" height="108" rx="14"/>
        <rect class="muted" x="239" y="18" width="38" height="30" rx="8"/>
        <text class="label" x="236" y="72">方案 C</text>
      </g>

      <rect class="dash" x="24" y="708" width="92" height="92" rx="14"/>
      <text class="label" x="46" y="760">上传</text>

      <rect class="panel-soft" x="24" y="840" width="304" height="146" rx="16"/>
      <text class="section" x="44" y="874">共享</text>
      <rect class="button" x="244" y="856" width="64" height="30" rx="10"/>
      <text class="label" x="266" y="876">选择</text>
      <rect class="muted" x="44" y="904" width="112" height="26" rx="13"/>
      <rect class="muted" x="166" y="904" width="112" height="26" rx="13"/>
      <line class="line" x1="44" y1="956" x2="290" y2="956"/>
    </g>

    <!-- Open participant sidebar -->
    <g transform="translate(1152 0)">
      <rect class="panel-soft" x="0" y="0" width="288" height="1130"/>
      <rect class="top" x="0" y="0" width="288" height="64"/>
      <text class="section" x="24" y="39">团队 (5)</text>
      <rect class="button" x="230" y="18" width="28" height="28" rx="8"/>
      <text class="label" x="239" y="37">收</text>

      <g transform="translate(18 86)">
        <rect class="panel" x="0" y="0" width="252" height="120" rx="16"/>
        <circle class="muted" cx="34" cy="34" r="20"/>
        <text class="section" x="66" y="32">主持人</text>
        <text class="label" x="66" y="54">Host / 在线</text>
        <rect class="panel-soft" x="18" y="76" width="216" height="30" rx="10"/>
        <text class="label" x="84" y="96">共享状态</text>

        <rect class="panel" x="0" y="140" width="252" height="120" rx="16"/>
        <circle class="muted" cx="34" cy="174" r="20"/>
        <text class="section" x="66" y="172">设计师 A</text>
        <text class="label" x="66" y="194">Designer / 当前用户</text>
        <rect class="panel-soft" x="18" y="216" width="216" height="30" rx="10"/>
        <text class="label" x="84" y="236">实时同步</text>

        <rect class="panel" x="0" y="280" width="252" height="120" rx="16"/>
        <circle class="muted" cx="34" cy="314" r="20"/>
        <text class="section" x="66" y="312">工程智能体</text>
        <text class="label" x="66" y="334">快捷键 F</text>
        <rect class="panel-soft" x="18" y="356" width="216" height="30" rx="10"/>
        <text class="label" x="88" y="376">角色评审</text>

        <rect class="panel" x="0" y="420" width="252" height="120" rx="16"/>
        <circle class="muted" cx="34" cy="454" r="20"/>
        <text class="section" x="66" y="452">乘客智能体</text>
        <text class="label" x="66" y="474">快捷键 G</text>
        <rect class="panel-soft" x="18" y="496" width="216" height="30" rx="10"/>
        <text class="label" x="88" y="516">角色评审</text>
      </g>
    </g>

    <!-- F/G summoned role review bubbles, floating over preview/member boundary -->
    <g transform="translate(986 612)">
      <rect class="overlay" x="0" y="0" width="326" height="122" rx="18"/>
      <circle class="muted" cx="28" cy="30" r="16"/>
      <text class="key" x="52" y="28">F 工程角色评审</text>
      <rect class="active" x="248" y="16" width="46" height="24" rx="12"/>
      <text class="key" x="267" y="33">F</text>
      <line class="line" x1="28" y1="62" x2="292" y2="62"/>
      <line class="line" x1="28" y1="88" x2="252" y2="88"/>
      <path class="panel" d="M0 44 L-18 56 L0 68 Z"/>
    </g>

    <g transform="translate(1008 754)">
      <rect class="overlay" x="0" y="0" width="326" height="122" rx="18"/>
      <circle class="muted" cx="28" cy="30" r="16"/>
      <text class="key" x="52" y="28">G 乘客角色评审</text>
      <rect class="active" x="248" y="16" width="46" height="24" rx="12"/>
      <text class="key" x="267" y="33">G</text>
      <line class="line" x1="28" y1="62" x2="292" y2="62"/>
      <line class="line" x1="28" y1="88" x2="252" y2="88"/>
      <path class="panel" d="M0 44 L-18 56 L0 68 Z"/>
    </g>
  </g>

  <g transform="translate(24 1144)">
    <rect class="panel-soft" x="0" y="0" width="1392" height="36" rx="8"/>
    <text class="small" x="18" y="24">低保真说明：该图表达第二阶段的展开/收拢状态差异，以及在选中纹理方案后通过 F/G 快捷键唤起工程和乘客智能体评审的浮层位置关系。</text>
  </g>
</svg>
