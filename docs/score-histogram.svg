<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">总分分布直方图</title>
  <desc id="desc">13 个总分样本按 80-85、85-90、90-95、95-100 四个区间统计，频数分别为 1、8、3、1。</desc>
  <rect width="760" height="520" fill="#ffffff"/>

  <style>
    text {
      font-family: "Times New Roman", "Noto Serif CJK SC", "SimSun", serif;
      fill: #1f2933;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
    }
    .axis-label {
      font-size: 17px;
      font-weight: 700;
    }
    .tick {
      font-size: 15px;
      fill: #56616f;
    }
    .value {
      font-size: 17px;
      font-weight: 700;
      fill: #2d3748;
    }
    .note {
      font-size: 13px;
      fill: #56616f;
    }
    .grid {
      stroke: #d8dee6;
      stroke-width: 1;
      stroke-dasharray: 4 5;
      shape-rendering: crispEdges;
    }
    .axis {
      stroke: #2d3748;
      stroke-width: 1.6;
      shape-rendering: crispEdges;
    }
    .bar {
      fill: #3E5C76;
      stroke: #ffffff;
      stroke-width: 1;
    }
  </style>

  <text class="title" x="380" y="56" text-anchor="middle">总分分布直方图</text>
  <text class="tick" x="380" y="86" text-anchor="middle">n = 13；区间宽度 = 5 分</text>

  <!-- Plot area: left=90, top=120, width=560, height=280. Y max=8. -->
  <g id="grid">
    <line class="grid" x1="90" y1="400" x2="650" y2="400"/>
    <line class="grid" x1="90" y1="330" x2="650" y2="330"/>
    <line class="grid" x1="90" y1="260" x2="650" y2="260"/>
    <line class="grid" x1="90" y1="190" x2="650" y2="190"/>
    <line class="grid" x1="90" y1="120" x2="650" y2="120"/>
  </g>

  <g id="bars">
    <rect class="bar" x="110" y="365" width="120" height="35"/>
    <rect class="bar" x="250" y="120" width="120" height="280"/>
    <rect class="bar" x="390" y="295" width="120" height="105"/>
    <rect class="bar" x="530" y="365" width="120" height="35"/>

    <text class="value" x="170" y="356" text-anchor="middle">1</text>
    <text class="value" x="310" y="111" text-anchor="middle">8</text>
    <text class="value" x="450" y="286" text-anchor="middle">3</text>
    <text class="value" x="590" y="356" text-anchor="middle">1</text>
  </g>

  <g id="axes">
    <line class="axis" x1="90" y1="120" x2="90" y2="400"/>
    <line class="axis" x1="90" y1="400" x2="650" y2="400"/>

    <line class="axis" x1="84" y1="400" x2="90" y2="400"/>
    <line class="axis" x1="84" y1="330" x2="90" y2="330"/>
    <line class="axis" x1="84" y1="260" x2="90" y2="260"/>
    <line class="axis" x1="84" y1="190" x2="90" y2="190"/>
    <line class="axis" x1="84" y1="120" x2="90" y2="120"/>
  </g>

  <g id="tick-labels">
    <text class="tick" x="76" y="405" text-anchor="end">0</text>
    <text class="tick" x="76" y="335" text-anchor="end">2</text>
    <text class="tick" x="76" y="265" text-anchor="end">4</text>
    <text class="tick" x="76" y="195" text-anchor="end">6</text>
    <text class="tick" x="76" y="125" text-anchor="end">8</text>

    <text class="tick" x="170" y="430" text-anchor="middle">80-85</text>
    <text class="tick" x="310" y="430" text-anchor="middle">85-90</text>
    <text class="tick" x="450" y="430" text-anchor="middle">90-95</text>
    <text class="tick" x="590" y="430" text-anchor="middle">95-100</text>
  </g>

  <text class="axis-label" x="370" y="472" text-anchor="middle">总分区间</text>
  <text class="axis-label" x="28" y="260" text-anchor="middle" transform="rotate(-90 28 260)">人数</text>

  <text class="note" x="90" y="504">注：原始总分为 97.1、94.1、85.3、86.8、89.7、89.7、89.7、85.3、94.1、82.4、89.7、94.1、88.2。</text>
</svg>
