<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">常用远程协作工具多选题结果</title>
  <desc id="desc">25 名受访者中，常用远程协作工具的多选结果。飞书、钉钉、腾讯会议 21 人，Figma/FigJam 16 人，Notion/飞书文档 13 人，Zoom/Microsoft Teams 8 人，Miro/Mural 6 人，其他 3 人。</desc>
  <rect width="1200" height="760" fill="#ffffff"/>

  <style>
    text {
      font-family: "Times New Roman", "Noto Serif CJK SC", "SimSun", serif;
      fill: #1f2933;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
    }
    .subtitle {
      font-size: 15px;
      fill: #56616f;
    }
    .label {
      font-size: 18px;
      fill: #1f2933;
    }
    .value {
      font-size: 17px;
      font-weight: 700;
      fill: #2d3748;
    }
    .tick {
      font-size: 14px;
      fill: #56616f;
    }
    .note {
      font-size: 13px;
      fill: #56616f;
    }
    .axis {
      stroke: #2d3748;
      stroke-width: 1.6;
      shape-rendering: crispEdges;
    }
    .grid {
      stroke: #d8dee6;
      stroke-width: 1;
      stroke-dasharray: 4 5;
      shape-rendering: crispEdges;
    }
  </style>

  <text class="title" x="600" y="64" text-anchor="middle">常用远程协作工具选择情况</text>
  <text class="subtitle" x="600" y="98" text-anchor="middle">多选题，最多选 3 项；n = 25</text>

  <!-- Plot area: x0=360, y0=155, width=700, scale=28 px/person, max=25. -->
  <g id="grid-lines">
    <line class="grid" x1="360" y1="150" x2="360" y2="565"/>
    <line class="grid" x1="500" y1="150" x2="500" y2="565"/>
    <line class="grid" x1="640" y1="150" x2="640" y2="565"/>
    <line class="grid" x1="780" y1="150" x2="780" y2="565"/>
    <line class="grid" x1="920" y1="150" x2="920" y2="565"/>
    <line class="grid" x1="1060" y1="150" x2="1060" y2="565"/>
  </g>

  <g id="bars">
    <text class="label" x="330" y="188" text-anchor="end">飞书 / 钉钉 / 腾讯会议</text>
    <rect x="360" y="161" width="588" height="38" fill="#3E5C76"/>
    <text class="value" x="966" y="188">21（84%）</text>

    <text class="label" x="330" y="254" text-anchor="end">Figma / FigJam</text>
    <rect x="360" y="227" width="448" height="38" fill="#4F8A8B"/>
    <text class="value" x="826" y="254">16（64%）</text>

    <text class="label" x="330" y="320" text-anchor="end">Notion / 飞书文档</text>
    <rect x="360" y="293" width="364" height="38" fill="#C49A3A"/>
    <text class="value" x="742" y="320">13（52%）</text>

    <text class="label" x="330" y="386" text-anchor="end">Zoom / Microsoft Teams</text>
    <rect x="360" y="359" width="224" height="38" fill="#6F7FA8"/>
    <text class="value" x="602" y="386">8（32%）</text>

    <text class="label" x="330" y="452" text-anchor="end">Miro / Mural</text>
    <rect x="360" y="425" width="168" height="38" fill="#A66A8A"/>
    <text class="value" x="546" y="452">6（24%）</text>

    <text class="label" x="330" y="518" text-anchor="end">其他</text>
    <rect x="360" y="491" width="84" height="38" fill="#B66D48"/>
    <text class="value" x="462" y="518">3（12%）</text>
  </g>

  <g id="axes">
    <line class="axis" x1="360" y1="150" x2="360" y2="565"/>
    <line class="axis" x1="360" y1="565" x2="1060" y2="565"/>

    <line class="axis" x1="360" y1="565" x2="360" y2="573"/>
    <line class="axis" x1="500" y1="565" x2="500" y2="573"/>
    <line class="axis" x1="640" y1="565" x2="640" y2="573"/>
    <line class="axis" x1="780" y1="565" x2="780" y2="573"/>
    <line class="axis" x1="920" y1="565" x2="920" y2="573"/>
    <line class="axis" x1="1060" y1="565" x2="1060" y2="573"/>
  </g>

  <g id="tick-labels">
    <text class="tick" x="360" y="596" text-anchor="middle">0</text>
    <text class="tick" x="500" y="596" text-anchor="middle">5</text>
    <text class="tick" x="640" y="596" text-anchor="middle">10</text>
    <text class="tick" x="780" y="596" text-anchor="middle">15</text>
    <text class="tick" x="920" y="596" text-anchor="middle">20</text>
    <text class="tick" x="1060" y="596" text-anchor="middle">25</text>
    <text class="tick" x="710" y="633" text-anchor="middle">选择人数</text>
  </g>

  <line x1="120" y1="675" x2="1080" y2="675" stroke="#d8dee6" stroke-width="1"/>
  <text class="note" x="120" y="706">注：本题为多选题，百分比表示选择该工具的人数占全部 25 名受访者的比例，因此各项百分比之和可能超过 100%。</text>
</svg>
