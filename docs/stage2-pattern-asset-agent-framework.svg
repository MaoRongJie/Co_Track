<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">图案素材 Agent 信息处理流程</title>
  <desc id="desc">Co-Track 第二阶段图案规划与图案生成 Agent 的信息处理流程。视觉理解、提示词组织与图像生成分别调用不同模型，非 Agent 调用的画布应用放置在后续流程中。</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#334155"/>
    </marker>
    <marker id="plainArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .core { fill: #53689c; stroke: #1f2f55; stroke-width: 1.3; }
      .core2 { fill: #425a87; stroke: #1f2f55; stroke-width: 1.3; }
      .input { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.2; }
      .output { fill: #eef6f5; stroke: #3f7f7a; stroke-width: 1.2; }
      .model { fill: #f3f0fa; stroke: #8b78b7; stroke-width: 1.2; }
      .apply { fill: #f6f1f1; stroke: #8b5d5d; stroke-width: 1.2; }
      .title { font: 700 28px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .h { font: 700 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .t { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .core-title { font: 700 19px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .core-text { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #dbe4f0; }
      .line { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .side-line { stroke: #64748b; stroke-width: 1.25; fill: none; marker-end: url(#plainArrow); }
      .side-line-back { stroke: #64748b; stroke-width: 1.25; fill: none; marker-end: url(#plainArrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="540"/>

  <text x="64" y="58" class="title">图案素材 Agent 信息处理流程</text>
  <text x="64" y="84" class="subtitle">先分析当前纹理与画布线索，再生成可插入 UV 画布的透明图案素材</text>

  <!-- Main flow -->
  <rect x="48" y="218" width="204" height="126" rx="10" class="input"/>
  <text x="86" y="260" class="h">输入</text>
  <text x="86" y="290" class="t">当前纹理 / UV 截图</text>
  <text x="86" y="316" class="small">图案意图、设计简报、色彩线索</text>

  <rect x="322" y="190" width="236" height="182" rx="10" class="core"/>
  <text x="362" y="242" class="core-title">图案规划 Agent</text>
  <text x="362" y="276" class="core-text">角色：素材分析者</text>
  <text x="362" y="304" class="core-text">分析：图形、色彩、复杂度</text>
  <text x="362" y="332" class="core-text">输出：图案生成线索</text>

  <rect x="644" y="190" width="236" height="182" rx="10" class="core2"/>
  <text x="684" y="242" class="core-title">图案生成 Agent</text>
  <text x="684" y="276" class="core-text">角色：图案素材生成者</text>
  <text x="684" y="304" class="core-text">生成：透明 PNG 素材</text>
  <text x="684" y="332" class="core-text">约束：无文字、无场景</text>

  <rect x="944" y="218" width="150" height="126" rx="10" class="output"/>
  <text x="978" y="260" class="h">输出</text>
  <text x="978" y="290" class="t">图案素材结果</text>
  <text x="978" y="316" class="small">PNG、提示词、主色、摘要</text>

  <!-- Model calls owned by agents -->
  <rect x="300" y="106" width="170" height="62" rx="9" class="model"/>
  <text x="326" y="134" class="h">视觉理解模型</text>
  <text x="326" y="156" class="small">gpt-4.1-free</text>

  <rect x="562" y="106" width="170" height="62" rx="9" class="model"/>
  <text x="588" y="134" class="h">提示词组织模型</text>
  <text x="588" y="156" class="small">gpt-4.1-free</text>

  <rect x="762" y="106" width="170" height="62" rx="9" class="model"/>
  <text x="788" y="134" class="h">图像生成模型</text>
  <text x="788" y="156" class="small">gpt-image-1</text>

  <!-- Non-agent follow-up -->
  <rect x="690" y="418" width="230" height="66" rx="9" class="apply"/>
  <text x="728" y="447" class="h">后续应用</text>
  <text x="728" y="469" class="small">插入 UV 画布继续编辑</text>

  <!-- Lines -->
  <path d="M252 281 L322 281" class="line"/>
  <path d="M558 281 L644 281" class="line"/>
  <path d="M880 281 L944 281" class="line"/>

  <path d="M385 190 L385 168" class="side-line"/>
  <path d="M411 168 L411 190" class="side-line"/>
  <path d="M647 168 L704 190" class="side-line"/>
  <path d="M847 168 L804 190" class="side-line"/>

  <path d="M1019 344 L1019 451 L920 451" class="side-line"/>
</svg>
