<svg xmlns="http://www.w3.org/2000/svg" width="670" height="421" viewBox="0 0 670 421" role="img" aria-labelledby="title desc">
  <title id="title">总分与平均值柱状图</title>
  <desc id="desc">13 个样本的总分柱状图，数值保留一位小数，并显示平均值 89.7 的红色水平线。</desc>
  <rect width="670" height="421" fill="#ffffff"/>

  <style>
    text {
      font-family: Calibri, Arial, "Microsoft YaHei", sans-serif;
      fill: #404040;
    }
    .tick {
      font-size: 15px;
    }
    .value {
      font-size: 14px;
    }
    .legend {
      font-size: 16px;
    }
    .grid {
      stroke: #d9d9d9;
      stroke-width: 1;
      shape-rendering: crispEdges;
    }
    .bar {
      fill: #4F81BD;
    }
    .average {
      stroke: #C0504D;
      stroke-width: 3;
      shape-rendering: crispEdges;
    }
  </style>

  <!-- Plot area: left=40, top=16, width=610, height=320. Y scale: 80 to 100. -->
  <g id="grid">
    <line class="grid" x1="40" y1="336" x2="650" y2="336"/>
    <line class="grid" x1="40" y1="304" x2="650" y2="304"/>
    <line class="grid" x1="40" y1="272" x2="650" y2="272"/>
    <line class="grid" x1="40" y1="240" x2="650" y2="240"/>
    <line class="grid" x1="40" y1="208" x2="650" y2="208"/>
    <line class="grid" x1="40" y1="176" x2="650" y2="176"/>
    <line class="grid" x1="40" y1="144" x2="650" y2="144"/>
    <line class="grid" x1="40" y1="112" x2="650" y2="112"/>
    <line class="grid" x1="40" y1="80" x2="650" y2="80"/>
    <line class="grid" x1="40" y1="48" x2="650" y2="48"/>
    <line class="grid" x1="40" y1="16" x2="650" y2="16"/>

    <text class="tick" x="26" y="341" text-anchor="end">80</text>
    <text class="tick" x="26" y="309" text-anchor="end">82</text>
    <text class="tick" x="26" y="277" text-anchor="end">84</text>
    <text class="tick" x="26" y="245" text-anchor="end">86</text>
    <text class="tick" x="26" y="213" text-anchor="end">88</text>
    <text class="tick" x="26" y="181" text-anchor="end">90</text>
    <text class="tick" x="26" y="149" text-anchor="end">92</text>
    <text class="tick" x="26" y="117" text-anchor="end">94</text>
    <text class="tick" x="26" y="85" text-anchor="end">96</text>
    <text class="tick" x="26" y="53" text-anchor="end">98</text>
    <text class="tick" x="26" y="21" text-anchor="end">100</text>
  </g>

  <g id="bars">
    <rect class="bar" x="57" y="62.4" width="15" height="273.6"/>
    <rect class="bar" x="104" y="110.4" width="15" height="225.6"/>
    <rect class="bar" x="151" y="251.2" width="15" height="84.8"/>
    <rect class="bar" x="198" y="227.2" width="15" height="108.8"/>
    <rect class="bar" x="244" y="164.8" width="15" height="171.2"/>
    <rect class="bar" x="291" y="164.8" width="15" height="171.2"/>
    <rect class="bar" x="338" y="164.8" width="15" height="171.2"/>
    <rect class="bar" x="385" y="251.2" width="15" height="84.8"/>
    <rect class="bar" x="432" y="110.4" width="15" height="225.6"/>
    <rect class="bar" x="478" y="297.6" width="15" height="38.4"/>
    <rect class="bar" x="525" y="164.8" width="15" height="171.2"/>
    <rect class="bar" x="572" y="110.4" width="15" height="225.6"/>
    <rect class="bar" x="619" y="204.8" width="15" height="131.2"/>
  </g>

  <line class="average" x1="40" y1="180.8" x2="650" y2="180.8"/>
  <text class="value" x="23" y="185.8">89.7</text>

  <g id="value-labels">
    <text class="value" x="64.5" y="57" text-anchor="middle">97.1</text>
    <text class="value" x="111.5" y="105" text-anchor="middle">94.1</text>
    <text class="value" x="158.5" y="246" text-anchor="middle">85.3</text>
    <text class="value" x="205.5" y="222" text-anchor="middle">86.8</text>
    <text class="value" x="251.5" y="160" text-anchor="middle">89.7</text>
    <text class="value" x="298.5" y="160" text-anchor="middle">89.7</text>
    <text class="value" x="345.5" y="160" text-anchor="middle">89.7</text>
    <text class="value" x="392.5" y="246" text-anchor="middle">85.3</text>
    <text class="value" x="439.5" y="105" text-anchor="middle">94.1</text>
    <text class="value" x="485.5" y="292" text-anchor="middle">82.4</text>
    <text class="value" x="532.5" y="160" text-anchor="middle">89.7</text>
    <text class="value" x="579.5" y="105" text-anchor="middle">94.1</text>
    <text class="value" x="626.5" y="200" text-anchor="middle">88.2</text>
  </g>

  <g id="x-axis-labels">
    <text class="tick" x="64.5" y="363" text-anchor="middle">1</text>
    <text class="tick" x="111.5" y="363" text-anchor="middle">2</text>
    <text class="tick" x="158.5" y="363" text-anchor="middle">3</text>
    <text class="tick" x="205.5" y="363" text-anchor="middle">4</text>
    <text class="tick" x="251.5" y="363" text-anchor="middle">5</text>
    <text class="tick" x="298.5" y="363" text-anchor="middle">6</text>
    <text class="tick" x="345.5" y="363" text-anchor="middle">7</text>
    <text class="tick" x="392.5" y="363" text-anchor="middle">8</text>
    <text class="tick" x="439.5" y="363" text-anchor="middle">9</text>
    <text class="tick" x="485.5" y="363" text-anchor="middle">10</text>
    <text class="tick" x="532.5" y="363" text-anchor="middle">11</text>
    <text class="tick" x="579.5" y="363" text-anchor="middle">12</text>
    <text class="tick" x="626.5" y="363" text-anchor="middle">13</text>
  </g>

  <g id="legend">
    <rect class="bar" x="244" y="392" width="37" height="9"/>
    <text class="legend" x="286" y="401">总分</text>
    <line class="average" x1="335" y1="396.5" x2="375" y2="396.5"/>
    <text class="legend" x="382" y="401">平均值</text>
  </g>
</svg>
